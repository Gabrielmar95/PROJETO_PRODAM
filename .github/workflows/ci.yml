name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Concurrency: cancela runs antigos do mesmo branch quando há novo push.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check-test-build:
    name: check / test / build
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 1

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 10.27.0
          run_install: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22.x
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: TypeScript check
        run: pnpm check

      - name: Vitest (server + client)
        run: pnpm test
        env:
          # Em CI não temos TiDB; testes que dependem de DATABASE_URL devem
          # tolerar ausência (admin.test usa try/catch).
          NODE_ENV: test

      - name: Build (vite + esbuild)
        run: pnpm build

      - name: Audit (HIGH only — falha se aparecer novo HIGH)
        run: |
          set -e
          OUTPUT=$(pnpm audit 2>&1 || true)
          HIGH_COUNT=$(echo "$OUTPUT" | grep -c "high  " || true)
          echo "HIGH vulnerabilities: $HIGH_COUNT"
          if [ "$HIGH_COUNT" -gt 0 ]; then
            echo "::error::Encontradas $HIGH_COUNT vulnerabilidades HIGH (Sprint 1 estabeleceu meta = 0)"
            echo "$OUTPUT" | tail -100
            exit 1
          fi
