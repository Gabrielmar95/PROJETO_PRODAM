name: PRODAM Tests

on:
  push:
    branches: [main, master]
    paths:
      - '**.py'
      - 'requirements.txt'
      - '.github/workflows/**'
  pull_request:
    branches: [main, master]
  workflow_dispatch:

jobs:
  test:
    name: Run tests + validate scripts
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.12"]

    steps:
      - uses: actions/checkout@v5

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest unidecode  # dev/runtime adicionais

      - name: Run unit tests (prodam_utils)
        run: |
          python -m pytest tests/ -v --tb=short

      - name: Syntax check all scripts
        run: |
          python -m compileall -q .

      - name: Validate profiles_resumo.csv structure
        run: |
          python -c "
          import csv
          esperado = {'sigla','categoria','forca','val_exig','val_atualizado',
                      'proximo_passo','fat_exig','fat_presc','urg_presc','d_plus','p_rec'}
          rows = list(csv.DictReader(open('profiles_resumo.csv')))
          assert set(rows[0].keys()) == esperado, f'Colunas inesperadas: {set(rows[0].keys())^esperado}'
          devs = [r for r in rows if not r['sigla'].startswith('_')]
          assert len(devs) > 50, f'Menos devedores que esperado: {len(devs)}'
          siglas = [r['sigla'] for r in devs]
          assert len(siglas) == len(set(siglas)), 'Siglas duplicadas no CSV'
          urgs_validas = {'CRITICA_IMINENTE','URGENTE','MEDIA','NORMAL','PRESCRITA','PROTEGIDA_ART202_VI',''}
          invalidas = {r['urg_presc'] for r in devs} - urgs_validas
          assert not invalidas, f'urg_presc inválido(s): {invalidas}'
          print(f'OK: {len(devs)} devedores, 11 colunas, siglas únicas, urg_presc válida')
          "

      - name: Smoke test sincronizar_prodam.py
        run: |
          # Se houver prodam.db, valida que --so-audit roda sem erro fatal
          if [ -f prodam.db ]; then
            python scripts/sincronizar_prodam.py --so-audit || echo "audit requires full data"
          fi
