name: Validador de citações jurídicas

# Bloqueia PR/push que cite "Teori Zavascki" como relator do REsp 793.969/RJ
# sem a ressalva "vencido" ou "p/ acórdão Min. José Delgado".
# Origem: cascata Teori→Delgado (12/05/2026), 8 arquivos com erro detectado.

on:
  push:
    paths:
      - '**.md'
      - '**.py'
      - '**.js'
      - 'scripts/validar_citacoes.py'
      - '.github/workflows/validar_citacoes.yml'
  pull_request:
    paths:
      - '**.md'
      - '**.py'
      - '**.js'

permissions:
  contents: read

jobs:
  validar:
    name: Bloqueia Teori como relator do REsp 793.969
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Roda validador
        run: python scripts/validar_citacoes.py
