<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PRODAM — Painel de Recuperação de Créditos</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --azul-escuro: #1F3864;
      --azul-medio: #2E75B6;
      --dourado: #C9A84C;
      --vermelho: #C00000;
      --bg: #faf9f5;
      --bg2: #F5F4EF;
      --card: #ffffff;
      --text: #141413;
      --text2: #5c5c5a;
      --text3: #8c8c8a;
      --border: #e5e4df;
      --shadow: rgba(20,20,19,0.04);
    }
    body { font-family:'Inter',sans-serif; background:var(--bg); color:var(--text); height:100vh; display:flex; flex-direction:column; overflow:hidden; }
    header { display:flex; justify-content:space-between; align-items:center; padding:16px 24px; border-bottom:2px solid var(--azul-escuro); background:var(--card); }
    .logo { display:flex; align-items:center; gap:12px; }
    .logo h1 { font-size:1.3rem; font-weight:700; color:var(--azul-escuro); }
    .logo span { font-size:0.75rem; color:var(--dourado); font-weight:600; letter-spacing:0.05em; text-transform:uppercase; }
    .views { display:flex; gap:4px; background:var(--bg2); padding:4px; border-radius:8px; }
    .views button { background:transparent; border:none; padding:8px 18px; font-size:13px; color:var(--text3); border-radius:6px; cursor:pointer; font-family:inherit; font-weight:500; }
    .views button.active { background:var(--card); color:var(--azul-escuro); box-shadow:0 1px 3px var(--shadow); }
    .views button:hover:not(.active) { color:var(--text); }

    /* KPI */
    .kpis { display:flex; gap:16px; padding:16px 24px; flex-shrink:0; flex-wrap:wrap; }
    .kpi { background:var(--card); border:1px solid var(--border); border-radius:10px; padding:14px 20px; flex:1; min-width:140px; }
    .kpi-value { font-size:1.6rem; font-weight:700; color:var(--azul-escuro); }
    .kpi-value.danger { color:var(--vermelho); }
    .kpi-label { font-size:0.7rem; color:var(--text3); text-transform:uppercase; letter-spacing:0.04em; margin-top:2px; }
    .kpi-sub { font-size:0.7rem; color:var(--text2); margin-top:4px; }

    /* KANBAN */
    .kanban { display:flex; gap:16px; padding:0 24px 24px; flex:1; overflow-x:auto; min-height:0; }
    .col { background:var(--bg2); border-radius:12px; min-width:280px; max-width:300px; display:flex; flex-direction:column; flex:1; }
    .col-header { padding:14px 16px; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.06em; display:flex; justify-content:space-between; align-items:center; border-radius:12px 12px 0 0; }
    .col-header .cnt { font-size:11px; background:rgba(255,255,255,0.6); padding:2px 8px; border-radius:10px; }
    .col[data-col="urgente"] .col-header { color:#991b1b; background:rgba(192,0,0,0.08); }
    .col[data-col="andamento"] .col-header { color:#1e40af; background:rgba(46,117,182,0.08); }
    .col[data-col="aguardando"] .col-header { color:#92400e; background:rgba(201,168,76,0.1); }
    .col[data-col="proximo"] .col-header { color:var(--text2); background:var(--bg2); }
    .col[data-col="lote"] .col-header { color:#6b21a8; background:rgba(107,33,168,0.06); }
    .cards { flex:1; overflow-y:auto; padding:8px 10px; }
    .cards::-webkit-scrollbar { width:5px; }
    .cards::-webkit-scrollbar-thumb { background:var(--border); border-radius:3px; }
    .tcard { background:var(--card); border:1px solid var(--border); border-radius:8px; padding:12px 14px; margin-bottom:8px; cursor:default; transition:box-shadow 0.15s; }
    .tcard:hover { box-shadow:0 4px 12px rgba(20,20,19,0.08); }
    .tcard.overdue { border-left:3px solid var(--vermelho); }
    .tcard-dev { font-size:10px; font-weight:600; color:var(--azul-medio); background:rgba(46,117,182,0.08); padding:2px 6px; border-radius:4px; display:inline-block; margin-bottom:6px; }
    .tcard-title { font-size:13px; font-weight:500; line-height:1.4; }
    .tcard-meta { font-size:11px; color:var(--text3); margin-top:6px; display:flex; gap:10px; }
    .tcard-meta .deadline { color:var(--vermelho); font-weight:500; }
    .tcard-meta .value { color:var(--dourado); font-weight:500; }

    /* TABLE VIEW */
    .table-wrap { flex:1; overflow:auto; padding:0 24px 24px; display:none; }
    .table-wrap.active { display:block; }
    .kanban.active { display:flex; }
    .search { display:flex; gap:12px; margin-bottom:16px; align-items:center; }
    .search input { flex:1; max-width:400px; padding:10px 16px; border:1px solid var(--border); border-radius:8px; font-size:14px; font-family:inherit; background:var(--card); }
    .search input:focus { outline:none; border-color:var(--azul-medio); }
    table { width:100%; border-collapse:collapse; font-size:13px; }
    th { text-align:left; padding:10px 14px; font-weight:600; font-size:11px; text-transform:uppercase; letter-spacing:0.04em; color:var(--text3); border-bottom:2px solid var(--border); cursor:pointer; user-select:none; white-space:nowrap; }
    th:hover { color:var(--azul-escuro); }
    th .arrow { font-size:10px; margin-left:4px; }
    td { padding:10px 14px; border-bottom:1px solid var(--border); }
    tr:hover td { background:var(--bg2); }
    .badge { display:inline-block; padding:2px 8px; border-radius:4px; font-size:11px; font-weight:600; }
    .badge-pp { background:rgba(46,117,182,0.1); color:#1e40af; white-space:nowrap; }
    .status-dot { display:inline-block; width:8px; height:8px; border-radius:50%; margin-right:6px; }
    .status-critico .status-dot { background:#C00000; }
    .status-urgente .status-dot { background:#ea580c; }
    .status-atencao .status-dot { background:#C9A84C; }
    .status-normal .status-dot { background:#22c55e; }
    .val { text-align:right; font-variant-numeric:tabular-nums; }
    .empty { text-align:center; padding:60px; color:var(--text3); }
    .empty p { margin-top:8px; font-size:14px; }

    footer { padding:8px 24px; font-size:11px; color:var(--text3); border-top:1px solid var(--border); background:var(--card); display:flex; justify-content:space-between; }
  </style>
</head>
<body>
  <header>
    <div class="logo">
      <h1>PRODAM — Recuperação de Créditos</h1>
      <span>Contrato 002/2026 · Brandão Ozores</span>
    </div>
    <div class="views">
      <button class="active" onclick="switchView('tarefas')">Tarefas</button>
      <button onclick="switchView('devedores')">Top devedores</button>
    </div>
  </header>

  <div class="kpis" id="kpis"></div>

  <div class="kanban active" id="kanban"></div>

  <div class="table-wrap" id="tableView">
    <div class="search">
      <input type="text" placeholder="Buscar por sigla, nome ou próximo passo..." id="searchInput" oninput="filterTable()">
    </div>
    <table>
      <thead>
        <tr>
          <th onclick="sortTable(0)">Sigla <span class="arrow"></span></th>
          <th onclick="sortTable(1)">Nome <span class="arrow"></span></th>
          <th onclick="sortTable(2)" class="val">Valor Exigível <span class="arrow"></span></th>
          <th onclick="sortTable(3)">Próximo Passo <span class="arrow"></span></th>
          <th onclick="sortTable(4)">Prescrição <span class="arrow"></span></th>
          <th onclick="sortTable(5)">Força <span class="arrow"></span></th>
          <th onclick="sortTable(6)">Status <span class="arrow"></span></th>
        </tr>
      </thead>
      <tbody id="tbody"></tbody>
    </table>
  </div>

  <footer>
    <span id="footerInfo">Snapshot 09/06/2026 (top 10 por valor) — execute /start e /update para carregar todos os 69 devedores de profiles.json</span>
    <span id="footerDate"></span>
  </footer>

<script>
// === RESUMO DO PORTFÓLIO (agregado real — fonte: CLAUDE.md do projeto, 09/06/2026) ===
const resumo = {
  totalDevedores: 69,
  valorExigivel: 83668078.44,
  valorAtualizado: 125245390.64,
  forte: 12, media: 15, fraca: 42,
  prescricao90d: 2
};

// === TOP 10 DEVEDORES (por valor exigível) ===
const devedores = [
  { sigla:"SEDUC", nome:"Secretaria de Estado de Educação", val_exig:49215512.48, proximo:"ANALISAR_DOCUMENTACAO", prescricao:null, forca:"FORTE", status:"atencao" },
  { sigla:"SES/SUSAM", nome:"Secretaria de Estado de Saúde", val_exig:4783356.52, proximo:"ENVIAR_TRD", prescricao:null, forca:"FORTE", status:"atencao" },
  { sigla:"SSP", nome:"Secretaria de Segurança Pública", val_exig:4553230.80, proximo:"PROTOCOLAR_PETICAO", prescricao:"2026-06-30", forca:"FORTE", status:"critico" },
  { sigla:"SEJUSC", nome:"Secretaria de Justiça, Direitos Humanos e Cidadania", val_exig:2589660.12, proximo:"ANALISAR_DOCUMENTACAO", prescricao:"2026-08-31", forca:"MÉDIA", status:"urgente" },
  { sigla:"SEAD", nome:"Secretaria de Administração", val_exig:2339702.20, proximo:"ENVIAR_TRD", prescricao:null, forca:"FORTE", status:"atencao" },
  { sigla:"BRADESCO", nome:"Banco Bradesco S.A.", val_exig:2226517.80, proximo:"CLASSIFICAR", prescricao:null, forca:"FRACA", status:"normal" },
  { sigla:"CETAM", nome:"Centro de Educação Tecnológica do Amazonas", val_exig:1256564.28, proximo:"CLASSIFICAR", prescricao:null, forca:"FRACA", status:"normal" },
  { sigla:"SEDECTI", nome:"Sec. de Desenvolvimento Econômico, Ciência, Tecnologia e Inovação", val_exig:1249203.13, proximo:"ANALISAR_DOCUMENTACAO", prescricao:null, forca:"MÉDIA", status:"normal" },
  { sigla:"SALUX", nome:"—", val_exig:1027949.15, proximo:"CLASSIFICAR", prescricao:null, forca:"FRACA", status:"normal" },
  { sigla:"POLÍCIA CIVIL", nome:"Polícia Civil do Amazonas", val_exig:960481.71, proximo:"ANALISAR_DOCUMENTACAO", prescricao:null, forca:"MÉDIA", status:"normal" }
];

// === TAREFAS (ilustrativas — derivadas do próximo passo e dos alertas; /update preenche o real) ===
const tarefas = {
  urgente: [
    { dev:"SSP", titulo:"Protocolar petição judicial (prescrição em curso)", prazo:"2026-06-30", valor:4553230.80 }
  ],
  andamento: [
    { dev:"SES/SUSAM", titulo:"Enviar TRD (8 cláusulas)", valor:4783356.52 },
    { dev:"SEAD", titulo:"Enviar TRD (8 cláusulas)", valor:2339702.20 },
    { dev:"SEDUC", titulo:"Analisar documentação do maior crédito", valor:49215512.48 },
    { dev:"SEJUSC", titulo:"Analisar documentação — prescrição 31/08/2026" }
  ],
  aguardando: [
    { dev:"Geral", titulo:"Acompanhar respostas às notificações enviadas" }
  ],
  proximo: [
    { dev:"Geral", titulo:"Relatório quinzenal à PRODAM" },
    { dev:"Geral", titulo:"Atualização monetária mensal dos créditos" }
  ],
  lote: [
    { dev:"Geral", titulo:"Classificar 17 devedores (próximo passo CLASSIFICAR)" },
    { dev:"Geral", titulo:"Enviar TRD para 9 devedores (próximo passo ENVIAR_TRD)" }
  ]
};

// === HELPERS ===
function fmtBRL(v) {
  if (v === null || v === undefined || v === '') return '';
  return 'R$ ' + v.toLocaleString('pt-BR', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function diasAte(d) {
  const diff = Math.ceil((new Date(d) - new Date()) / 86400000);
  return diff;
}
function fmtData(d) {
  if (!d) return '';
  const p = d.split('-');
  return p[2]+'/'+p[1]+'/'+p[0];
}

// === RENDER KPIs ===
function renderKPIs() {
  const pendentes = Object.values(tarefas).flat().length;
  document.getElementById('kpis').innerHTML = `
    <div class="kpi"><div class="kpi-value">${resumo.totalDevedores}</div><div class="kpi-label">Devedores</div><div class="kpi-sub">${resumo.forte} FORTE · ${resumo.media} MÉDIA · ${resumo.fraca} FRACA</div></div>
    <div class="kpi"><div class="kpi-value">${fmtBRL(resumo.valorExigivel)}</div><div class="kpi-label">Valor Total Exigível</div><div class="kpi-sub">Atualizado: ${fmtBRL(resumo.valorAtualizado)}</div></div>
    <div class="kpi"><div class="kpi-value danger">${resumo.prescricao90d}</div><div class="kpi-label">Prescrição <90 dias</div><div class="kpi-sub">SSP (30/06) · SEJUSC (31/08)</div></div>
    <div class="kpi"><div class="kpi-value">${pendentes}</div><div class="kpi-label">Ações em destaque</div></div>
  `;
}

// === RENDER KANBAN ===
function renderKanban() {
  const cols = [
    { id:'urgente', label:'URGENTE', data:tarefas.urgente },
    { id:'andamento', label:'EM ANDAMENTO', data:tarefas.andamento },
    { id:'aguardando', label:'AGUARDANDO', data:tarefas.aguardando },
    { id:'proximo', label:'PRÓXIMO CICLO', data:tarefas.proximo },
    { id:'lote', label:'LOTE', data:tarefas.lote }
  ];
  const el = document.getElementById('kanban');
  el.innerHTML = cols.map(c => `
    <div class="col" data-col="${c.id}">
      <div class="col-header">${c.label} <span class="cnt">${c.data.length}</span></div>
      <div class="cards">${c.data.map(t => {
        const dias = t.prazo ? diasAte(t.prazo) : null;
        const overdue = dias !== null && dias < 0;
        return `<div class="tcard${overdue?' overdue':''}">
          <span class="tcard-dev">${t.dev}</span>
          <div class="tcard-title">${t.titulo}</div>
          <div class="tcard-meta">
            ${t.prazo ? `<span class="${dias<=0?'deadline':''}">${fmtData(t.prazo)} (${dias>0?dias+'d':'VENCIDO'})</span>` : ''}
            ${t.valor ? `<span class="value">${fmtBRL(t.valor)}</span>` : ''}
          </div>
        </div>`;
      }).join('')}</div>
    </div>
  `).join('');
}

// === RENDER TABLE ===
let sortCol = -1, sortAsc = true;
function renderTable(data) {
  const tb = document.getElementById('tbody');
  if (!data) data = devedores;
  tb.innerHTML = data.map(d => {
    const dias = d.prescricao ? diasAte(d.prescricao) : null;
    const presc = d.prescricao
      ? `${fmtData(d.prescricao)} <span style="color:${dias<=30?'#C00000':dias<=90?'#ea580c':'#8c8c8a'};font-size:11px">(${dias}d)</span>`
      : '<span style="color:#8c8c8a">—</span>';
    return `<tr>
      <td><strong>${d.sigla}</strong></td>
      <td>${d.nome}</td>
      <td class="val">${fmtBRL(d.val_exig)}</td>
      <td><span class="badge badge-pp">${d.proximo}</span></td>
      <td>${presc}</td>
      <td>${d.forca}</td>
      <td class="status-${d.status}"><span class="status-dot"></span>${d.status.charAt(0).toUpperCase()+d.status.slice(1)}</td>
    </tr>`;
  }).join('');
}
function sortTable(col) {
  if (sortCol === col) sortAsc = !sortAsc; else { sortCol = col; sortAsc = true; }
  const keys = ['sigla','nome','val_exig','proximo','prescricao','forca','status'];
  const k = keys[col];
  devedores.sort((a,b) => {
    let va = a[k], vb = b[k];
    if (typeof va === 'number') return sortAsc ? va-vb : vb-va;
    va = va || ''; vb = vb || '';
    return sortAsc ? String(va).localeCompare(String(vb)) : String(vb).localeCompare(String(va));
  });
  renderTable();
}
function filterTable() {
  const q = document.getElementById('searchInput').value.toLowerCase();
  const filtered = devedores.filter(d => d.sigla.toLowerCase().includes(q) || d.nome.toLowerCase().includes(q) || d.proximo.toLowerCase().includes(q));
  renderTable(filtered);
}

// === VIEW SWITCH ===
function switchView(v) {
  document.querySelectorAll('.views button').forEach(b => b.classList.remove('active'));
  event.target.classList.add('active');
  document.getElementById('kanban').classList.toggle('active', v==='tarefas');
  document.getElementById('kanban').style.display = v==='tarefas' ? 'flex' : 'none';
  document.getElementById('tableView').classList.toggle('active', v==='devedores');
}

// === INIT ===
renderKPIs();
renderKanban();
renderTable();
document.getElementById('footerDate').textContent = new Date().toLocaleDateString('pt-BR');
</script>
</body>
</html>
